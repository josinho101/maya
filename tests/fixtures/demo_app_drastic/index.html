<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MAYA Demo App</title>
</head>
<body>
  <form id="login-form">
    <label for="username">Username</label>
    <input id="username" name="username" type="text" />
    <label for="password">Password</label>
    <input id="password" name="password" type="password" />
    <button type="submit" data-testid="login-button">Log in</button>
  </form>

  <input id="upload" type="file" data-testid="upload-input" />

  <button id="reveal-panel" type="button" data-testid="reveal-panel-button">Settings</button>

  <section id="settings-panel" role="dialog" aria-label="Settings" hidden>
    <h2>Settings</h2>
  </section>

  <script>
    document.getElementById("login-form").addEventListener("submit", (event) => {
      event.preventDefault();
    });

    document.getElementById("reveal-panel").addEventListener("click", () => {
      document.getElementById("settings-panel").hidden = false;
    });
  </script>
</body>
</html>
