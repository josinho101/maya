tags:
  - Students
summary: Update a student
description: Requires admin role. name and email are mandatory; age and class_id are optional.
security:
  - Bearer: []
parameters:
  - name: student_id
    in: path
    required: true
    schema: {type: string}
    example: S1
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required: [name, email]
        properties:
          name:
            type: string
          email:
            type: string
            description: Must be unique among students (excluding this student).
          age:
            type: integer
            nullable: true
          class_id:
            type: string
            nullable: true
            description: Must reference an existing class id if provided.
responses:
  200:
    description: Student updated
    content:
      application/json:
        schema:
          type: object
          properties:
            id: {type: string}
            name: {type: string}
            email: {type: string}
            age: {type: integer, nullable: true}
            class_id: {type: string, nullable: true}
            photo_url: {type: string, nullable: true}
  400:
    description: name/email missing or invalid, email already in use, age not a positive integer, or class_id does not exist
  401:
    description: Authentication required
  403:
    description: Admin access required
  404:
    description: Student not found
