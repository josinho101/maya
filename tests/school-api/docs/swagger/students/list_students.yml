tags:
  - Students
summary: List students (paginated)
security:
  - Bearer: []
parameters:
  - name: page
    in: query
    required: false
    schema: {type: integer, minimum: 1, default: 1}
    description: Page number. Defaults to 1 if not supplied.
  - name: page_size
    in: query
    required: false
    schema: {type: integer, minimum: 1, default: 10}
    description: Number of items per page. Defaults to 10 if not supplied.
responses:
  200:
    description: Paginated list of students
    content:
      application/json:
        schema:
          type: object
          properties:
            items:
              type: array
              items:
                type: object
                properties:
                  id: {type: string}
                  name: {type: string}
                  email: {type: string}
                  age: {type: integer, nullable: true}
                  class_id: {type: string, nullable: true}
                  photo_url: {type: string, nullable: true}
            page: {type: integer}
            page_size: {type: integer}
            total: {type: integer}
  400:
    description: page or page_size is not a positive integer
  401:
    description: Authentication required
