tags:
  - Students
summary: Delete a student
description: Requires admin role. Also deletes the student's uploaded photo file, if any.
security:
  - Bearer: []
parameters:
  - name: student_id
    in: path
    required: true
    schema: {type: string}
    example: S1
responses:
  200:
    description: Student deleted
    content:
      application/json:
        schema:
          type: object
          properties:
            deleted: {type: string}
  401:
    description: Authentication required
  403:
    description: Admin access required
  404:
    description: Student not found
