tags:
  - Scenario Jobs
summary: Get a single scenario job
security:
  - Bearer: []
parameters:
  - in: path
    name: project_id
    type: string
    required: true
  - in: path
    name: job_id
    type: string
    required: true
responses:
  200:
    description: Scenario job details
    schema:
      type: object
      properties:
        id: {type: string}
        gen_id: {type: string}
        endpoint: {type: string}
        method: {type: string}
        scenario: {type: string}
        status: {type: string, enum: [QUEUED, RUNNING, DONE, FAILED, CANCELLED]}
        stop_requested: {type: boolean}
        created_at: {type: string, format: date-time}
        started_at: {type: string, format: date-time}
        completed_at: {type: string, format: date-time}
        tc_id: {type: string}
        error: {type: string}
  401:
    description: Authentication required
  404:
    description: Project or job not found
