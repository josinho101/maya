tags:
  - Scenario Jobs
summary: Request cancellation of a scenario job
description: If the job hasn't started, it's marked CANCELLED immediately. If it's already running, the result is discarded once the in-flight LLM call returns.
security:
  - Bearer: []
parameters:
  - in: path
    name: project_id
    type: string
    required: true
  - in: path
    name: job_id
    type: string
    required: true
responses:
  202:
    description: Stop requested
    schema:
      type: object
      properties:
        id: {type: string}
        status: {type: string}
        stop_requested: {type: boolean}
  400:
    description: Job has already finished (DONE/FAILED/CANCELLED)
  401:
    description: Authentication required
  403:
    description: Admin access required
  404:
    description: Project or job not found
