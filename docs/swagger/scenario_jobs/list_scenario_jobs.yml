tags:
  - Scenario Jobs
summary: List all scenario jobs for a project
security:
  - Bearer: []
parameters:
  - in: path
    name: project_id
    required: true
    schema:
      type: string
responses:
  200:
    description: Array of scenario jobs
    content:
      application/json:
        schema:
          type: array
          items:
            type: object
            properties:
              id: {type: string}
              gen_id: {type: string}
              endpoint: {type: string}
              method: {type: string}
              scenario: {type: string}
              status: {type: string, enum: [QUEUED, RUNNING, DONE, FAILED, CANCELLED]}
              stop_requested: {type: boolean}
              created_at: {type: string, format: date-time}
              started_at: {type: string, format: date-time}
              completed_at: {type: string, format: date-time}
              tc_id: {type: string}
              error: {type: string}
  401:
    description: Authentication required
  404:
    description: Project not found
