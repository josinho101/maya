tags:
  - Swagger
summary: Import a Swagger/OpenAPI spec from a URL
description: Fetches the spec from an HTTP(S) URL (or local path) and parses it the same way as a file upload.
security:
  - Bearer: []
parameters:
  - in: path
    name: project_id
    required: true
    schema:
      type: string
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required: [url]
        properties:
          url:
            type: string
responses:
  201:
    description: Spec fetched and parsed
    content:
      application/json:
        schema:
          type: object
          properties:
            filename: {type: string}
            file_path: {type: string}
            uploaded_at: {type: string, format: date-time}
            parsed_at: {type: string, format: date-time}
            endpoint_count: {type: integer}
            output_dir: {type: string}
            parsed_json_path: {type: string}
            base_url: {type: string}
            environments:
              type: array
              items: {type: object}
            needs_env_naming: {type: boolean}
            no_servers_found: {type: boolean}
  400:
    description: Missing or invalid URL
  401:
    description: Authentication required
  403:
    description: Admin access required
  404:
    description: Project not found
  500:
    description: Spec could not be fetched or parsed
