tags:
  - Generations
summary: List all generations for a project
security:
  - Bearer: []
parameters:
  - in: path
    name: project_id
    required: true
    schema:
      type: string
responses:
  200:
    description: Array of generations, most recent first
    content:
      application/json:
        schema:
          type: array
          items:
            type: object
            properties:
              id: {type: string}
              project_id: {type: string}
              status: {type: string, enum: [PENDING, GENERATING, SCENARIOS_READY, GENERATING_STEPS, REVIEW, APPROVED, STOPPED, FAILED]}
              created_at: {type: string, format: date-time}
              completed_at: {type: string, format: date-time}
              error: {type: string}
  401:
    description: Authentication required
  404:
    description: Project not found
