tags:
  - Generations
summary: Upload a file for use as test data
description: Uploads a file (e.g. for a file-upload endpoint's test case) and returns its absolute path on disk for use in a test case's `files` field.
consumes:
  - multipart/form-data
security:
  - Bearer: []
parameters:
  - in: path
    name: project_id
    type: string
    required: true
  - in: path
    name: gen_id
    type: string
    required: true
  - in: formData
    name: file
    type: file
    required: true
responses:
  201:
    description: File uploaded
    schema:
      type: object
      properties:
        path:
          type: string
  400:
    description: Missing file or invalid filename
  401:
    description: Authentication required
  403:
    description: Admin access required
  404:
    description: Project or generation not found
