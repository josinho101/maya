tags:
  - Generations
summary: Upload a file for use as test data
description: Uploads a file (e.g. for a file-upload endpoint's test case) and returns its absolute path on disk for use in a test case's `files` field.
security:
  - Bearer: []
parameters:
  - in: path
    name: project_id
    required: true
    schema:
      type: string
  - in: path
    name: gen_id
    required: true
    schema:
      type: string
requestBody:
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        required: [file]
        properties:
          file:
            type: string
            format: binary
responses:
  201:
    description: File uploaded
    content:
      application/json:
        schema:
          type: object
          properties:
            path:
              type: string
  400:
    description: Missing file or invalid filename
  401:
    description: Authentication required
  403:
    description: Admin access required
  404:
    description: Project or generation not found
