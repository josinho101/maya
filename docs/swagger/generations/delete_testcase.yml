tags:
  - Generations
summary: Delete a test case
security:
  - Bearer: []
parameters:
  - in: path
    name: project_id
    required: true
    schema:
      type: string
  - in: path
    name: gen_id
    required: true
    schema:
      type: string
  - in: path
    name: tc_id
    required: true
    schema:
      type: string
responses:
  200:
    description: Test case deleted
    content:
      application/json:
        schema:
          type: object
          properties:
            deleted:
              type: string
  401:
    description: Authentication required
  403:
    description: Admin access required
  404:
    description: Test case not found
