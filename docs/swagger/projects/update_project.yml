tags:
  - Projects
summary: Update a project's name and/or description
security:
  - Bearer: []
parameters:
  - in: path
    name: project_id
    required: true
    schema:
      type: string
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        properties:
          name:
            type: string
          description:
            type: string
responses:
  200:
    description: Updated project
    content:
      application/json:
        schema:
          type: object
          properties:
            id: {type: string}
            name: {type: string}
            slug: {type: string}
            description: {type: string}
            created_at: {type: string, format: date-time}
            updated_at: {type: string, format: date-time}
  400:
    description: Invalid update payload
  401:
    description: Authentication required
  403:
    description: Admin access required
  404:
    description: Project not found
