tags:
  - Projects
summary: Create a new project
description: Creates a project and derives a URL-safe slug from its name. Requires admin role.
security:
  - Bearer: []
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required: [name]
        properties:
          name:
            type: string
          description:
            type: string
responses:
  201:
    description: Project created
    content:
      application/json:
        schema:
          type: object
          properties:
            id: {type: string}
            name: {type: string}
            slug: {type: string}
            description: {type: string}
            created_at: {type: string, format: date-time}
            updated_at: {type: string, format: date-time}
  400:
    description: Name is missing or empty
  401:
    description: Authentication required
  403:
    description: Admin access required
