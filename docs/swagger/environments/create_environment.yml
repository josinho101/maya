tags:
  - Environments
summary: Create a manual environment
description: Adds a manually-defined base URL environment (as opposed to one auto-synced from a swagger spec's servers list).
consumes:
  - application/json
security:
  - Bearer: []
parameters:
  - in: path
    name: project_id
    type: string
    required: true
  - in: body
    name: body
    required: true
    schema:
      type: object
      required: [name, url]
      properties:
        name: {type: string}
        url: {type: string}
responses:
  201:
    description: Updated list of environments, including the new one
    schema:
      type: array
      items:
        type: object
        properties:
          id: {type: string}
          name: {type: string}
          url: {type: string}
          source: {type: string, enum: [manual]}
  400:
    description: Missing name/url or invalid URL
  401:
    description: Authentication required
  404:
    description: Project not found
